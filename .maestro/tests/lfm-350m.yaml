appId: io.tensorpath.chat
tags:
  - lfm-350m

---

# ========== SETUP ==========
- runFlow:
    file: ../helpers/app-ready.yaml
- runFlow:
    file: ../helpers/select-model.yaml
    env:
      MODEL_NAME: "LFM2.5-350M BF16"

# ========== TEST 1: Basic Chat ==========
- runFlow:
    file: ../helpers/new-chat.yaml
- runFlow:
    file: ../helpers/send-message.yaml
    env:
      MESSAGE: "Hello"
- runFlow:
    file: ../helpers/wait-for-response.yaml
# No raw markup leaked
- assertNotVisible:
    text: "<think>"
- assertNotVisible:
    text: "<|tool_call_start|>"

# ========== TEST 2: No Thinking ==========
- runFlow:
    file: ../helpers/new-chat.yaml
- runFlow:
    file: ../helpers/send-message.yaml
    env:
      MESSAGE: "What is 2+2?"
- runFlow:
    file: ../helpers/wait-for-response.yaml
# No thinking section (model doesn't support thinking)
- assertNotVisible:
    text: "Reasoning"
- assertNotVisible:
    text: "Thought for"
- assertNotVisible:
    text: "Thinking"

# ========== TEST 3: No Vision ==========
- runFlow:
    file: ../helpers/open-attach-menu.yaml
- assertVisible:
    text: ".*Files.*"
# Camera tap should be no-op (vision disabled)
- tapOn:
    text: ".*Camera.*"
    optional: true
- assertVisible:
    text: ".*Files.*"
# Tap outside the menu to dismiss it
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd

# ========== TEST 4: Web Search ==========
- runFlow:
    file: ../helpers/new-chat.yaml
- assertVisible:
    id: "web-search-toggle"
- tapOn:
    id: "web-search-toggle"
- extendedWaitUntil:
    visible:
      text: ".*DuckDuckGo.*"
    timeout: 5000
- runFlow:
    file: ../helpers/send-message.yaml
    env:
      MESSAGE: "Search the web for today's weather forecast"
# Verify the model actually invoked web search
- extendedWaitUntil:
    visible:
      text: ".*Searching.*"
    timeout: 60000
- runFlow:
    file: ../helpers/wait-for-response.yaml
- assertNotVisible:
    text: "<|tool_call_start|>"
- assertNotVisible:
    text: "<think>"
